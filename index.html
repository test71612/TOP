<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iframe Viewer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600&family=Inter:wght@400;500;600&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ===== TRANSPARENT BACKGROUND FIX ===== */
    html, body {
      background: transparent !important;
      background-color: transparent !important;
    }
    /* ======================================= */

    html, body { height: 100%; width: 100%; overflow: hidden; }
    body { font-family: 'IBM Plex Sans Arabic', 'Inter', sans-serif; color: #e2e8f0; }
    .app-root { display: flex; flex-direction: column; height: 100vh; width: 100vw; overflow: hidden; }
    .top-bar { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: #16181f; border-bottom: 1px solid rgba(255,255,255,.07); flex-shrink: 0; direction: rtl; }
    .logo { font-size: 14px; font-weight: 600; color: #94a3b8; white-space: nowrap; }
    .url-bar { flex: 1; display: flex; align-items: center; gap: 8px; direction: ltr; }
    .url-input { flex: 1; height: 38px; padding: 0 12px; background: #1e2130; border: 1.5px solid rgba(255,255,255,.1); border-radius: 9px; color: #e2e8f0; font-size: 13px; font-family: 'Inter', monospace; outline: none; transition: border-color .2s; }
    .url-input:disabled { opacity: .4; cursor: not-allowed; }
    .url-input::placeholder { color: #4a5568; }
    .url-input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.15); }
    .go-btn { height: 38px; padding: 0 18px; background: #6366f1; color: #fff; border: none; border-radius: 9px; font-size: 13px; font-family: 'IBM Plex Sans Arabic', sans-serif; font-weight: 600; cursor: pointer; white-space: nowrap; transition: background .18s; }
    .go-btn:hover:not(:disabled) { background: #4f46e5; }
    .go-btn:disabled { opacity: .4; cursor: not-allowed; }
    .icon-btn { height: 38px; padding: 0 16px; background: #1e2130; border: 1.5px solid rgba(255,255,255,.1); border-radius: 9px; color: #94a3b8; font-size: 13px; font-family: 'IBM Plex Sans Arabic', sans-serif; font-weight: 600; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: background .18s, border-color .18s, color .18s; }
    .icon-btn:hover { border-color: #6366f1; color: #c7d2fe; }
    .icon-btn.open { border-color: #6366f1; color: #a5b4fc; background: rgba(99,102,241,.1); }
    .icon-btn.stop { background: rgba(239,68,68,.12); border-color: rgba(239,68,68,.4); color: #fca5a5; }
    /* Loop bar */
    .loop-bar-wrap { position: relative; height: 30px; background: #1a1d27; border-bottom: 1px solid rgba(255,255,255,.06); overflow: hidden; flex-shrink: 0; display: none; }
    .loop-bar-fill { position: absolute; inset: 0; height: 100%; background: linear-gradient(90deg,rgba(99,102,241,.3),rgba(139,92,246,.2)); transition: width .9s linear; }
    .preload-indicator { position: absolute; top: 0; right: 0; width: 3px; height: 100%; background: #6366f1; box-shadow: 0 0 8px 2px rgba(99,102,241,.7); animation: preload-pulse .8s ease-in-out infinite alternate; display: none; }
    @keyframes preload-pulse { from { opacity: .5; } to { opacity: 1; } }
    .loop-bar-label { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 11px; color: #94a3b8; font-family: 'Inter', monospace; direction: ltr; pointer-events: none; }
    .preload-badge { font-size: 10px; background: rgba(99,102,241,.2); border: 1px solid rgba(99,102,241,.35); color: #a5b4fc; border-radius: 4px; padding: 1px 6px; font-family: 'IBM Plex Sans Arabic', sans-serif; white-space: nowrap; display: none; }
    /* Settings */
    .settings-panel { background: #13151e; border-bottom: 1px solid rgba(255,255,255,.08); padding: 20px 20px 16px; direction: rtl; flex-shrink: 0; max-height: 60vh; overflow-y: auto; display: none; }
    .settings-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .settings-header h2 { font-size: 15px; font-weight: 600; }
    .close-btn { width: 28px; height: 28px; background: rgba(255,255,255,.06); border: none; border-radius: 6px; color: #64748b; cursor: pointer; font-size: 13px; }
    .close-btn:hover { background: rgba(255,255,255,.12); color: #e2e8f0; }
    .settings-row { display: flex; gap: 20px; flex-wrap: wrap; }
    .settings-field { flex: 1; min-width: 140px; }
    .field-label { display: block; font-size: 12px; font-weight: 500; color: #64748b; margin-bottom: 8px; }
    .field-hint { display: block; font-size: 11px; color: #374151; margin-top: 6px; line-height: 1.5; }
    .interval-row { display: flex; align-items: center; gap: 8px; }
    .interval-input { width: 80px; height: 36px; padding: 0 10px; background: #1e2130; border: 1.5px solid rgba(255,255,255,.1); border-radius: 8px; color: #e2e8f0; font-size: 14px; font-family: 'Inter', monospace; outline: none; text-align: center; }
    .interval-input:focus { border-color: #6366f1; }
    .interval-unit { font-size: 13px; color: #64748b; }
    .entries-list { display: flex; flex-direction: column; gap: 8px; margin-top: 6px; }
    .entry-row { display: flex; align-items: center; gap: 8px; direction: ltr; }
    .entry-num { width: 22px; height: 22px; background: rgba(99,102,241,.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #a5b4fc; flex-shrink: 0; }
    .entry-input { flex: 1; height: 36px; padding: 0 10px; background: #1e2130; border: 1.5px solid rgba(255,255,255,.09); border-radius: 8px; color: #e2e8f0; font-size: 13px; font-family: 'Inter', monospace; outline: none; }
    .entry-input:focus { border-color: #6366f1; }
    .entry-input::placeholder { color: #374151; }
    .remove-btn { width: 28px; height: 28px; background: rgba(239,68,68,.1); border: none; border-radius: 6px; color: #f87171; font-size: 12px; cursor: pointer; flex-shrink: 0; }
    .remove-btn:hover { background: rgba(239,68,68,.2); }
    .add-btn { margin-top: 10px; height: 34px; padding: 0 14px; background: transparent; border: 1.5px dashed rgba(255,255,255,.12); border-radius: 8px; color: #64748b; font-size: 13px; font-family: 'IBM Plex Sans Arabic', sans-serif; cursor: pointer; width: 100%; transition: border-color .18s, color .18s; }
    .add-btn:hover { border-color: #6366f1; color: #a5b4fc; }
    .settings-footer { margin-top: 16px; border-top: 1px solid rgba(255,255,255,.06); padding-top: 16px; }
    .apply-btn { width: 100%; height: 40px; background: linear-gradient(135deg,#6366f1,#8b5cf6); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-family: 'IBM Plex Sans Arabic', sans-serif; font-weight: 600; cursor: pointer; }
    .apply-btn:hover:not(:disabled) { opacity: .9; }
    .apply-btn:disabled { opacity: .35; cursor: not-allowed; }
    /* Frame */
    .frame-area { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; background: none; }

    /* ===== TRANSPARENT BACKGROUND FIX FOR IFRAMES ===== */
    .embed-frame {
      position: absolute; inset: 0; width: 100%; height: 100%; border: none;
      background: transparent !important;
      background-color: transparent !important;
    }
    /* =================================================== */

    .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; text-align: center; direction: rtl; }
    .empty-icon { font-size: 52px; opacity: .45; }
    .empty-state p { font-size: 15px; line-height: 1.7; color: #64748b; }
    .empty-state strong { color: #6366f1; }
  </style>
</head>
<body>
<div class="app-root">
  <header class="top-bar">
    <span class="logo">🔗 iframe Viewer</span>
    <div class="url-bar">
      <input id="singleInput" type="text" class="url-input" placeholder="أدخل رابطاً واحداً هنا... مثال: google.com" dir="ltr" spellcheck="false" />
      <button id="goBtn" class="go-btn" onclick="go()">عرض</button>
    </div>
    <button id="settingsBtn" class="icon-btn" onclick="toggleSettings()">⚙️ لوب</button>
  </header>

  <div id="loopBar" class="loop-bar-wrap">
    <div id="loopBarFill" class="loop-bar-fill" style="width:0%"></div>
    <div id="preloadIndicator" class="preload-indicator"></div>
    <span class="loop-bar-label">
      <span id="preloadBadge" class="preload-badge">⚡ جاري التجهيز</span>
      <span id="loopBarText"></span>
    </span>
  </div>

  <div id="settingsPanel" class="settings-panel">
    <div class="settings-header">
      <h2>إعدادات اللوب</h2>
      <button class="close-btn" onclick="toggleSettings()">✕</button>
    </div>
    <div class="settings-row">
      <div class="settings-field">
        <label class="field-label">المدة بين كل رابط</label>
        <div class="interval-row">
          <input id="intervalInput" type="number" class="interval-input" value="10" min="1" max="3600" />
          <span class="interval-unit">ثانية</span>
        </div>
      </div>
      <div class="settings-field">
        <label class="field-label">التحميل المسبق قبل التبديل</label>
        <div class="interval-row">
          <input id="preloadInput" type="number" class="interval-input" value="3" min="1" max="60" />
          <span class="interval-unit">ثانية</span>
        </div>
        <span class="field-hint">يبدأ تحميل الرابط التالي قبل التبديل بهذه المدة</span>
      </div>
    </div>
    <label class="field-label" style="margin-top:20px">الروابط</label>
    <div id="entriesList" class="entries-list"></div>
    <button class="add-btn" onclick="addEntry()">+ إضافة رابط</button>
    <div class="settings-footer">
      <button id="applyBtn" class="apply-btn" onclick="applyLoop()">▶ تشغيل اللوب</button>
    </div>
  </div>

  <main class="frame-area">
    <div id="emptyState" class="empty-state">
      <div class="empty-icon">🌐</div>
      <p>أدخل رابطاً وانقر <strong>عرض</strong></p>
      <p>أو افتح <strong>⚙️ لوب</strong> لتشغيل روابط متعددة تلقائياً</p>
    </div>
    <iframe id="frameA" class="embed-frame" style="display:none" allowtransparency="true"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"></iframe>
    <iframe id="frameB" class="embed-frame" style="display:none" allowtransparency="true"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"></iframe>
  </main>
</div>

<script>
  const SANDBOX = "allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox";
  const STORAGE_KEY = 'iframe-viewer-settings';

  // ===== TRANSPARENT BACKGROUND CSS TO INJECT INTO IFRAMES =====
  const TRANSPARENT_CSS = `
    html, body {
      background: transparent !important;
      background-color: transparent !important;
      margin: 0px auto !important;
      overflow: hidden !important;
    }
  `;

  function injectTransparentBg(iframe) {
    try {
      const doc = iframe.contentDocument || iframe.contentWindow?.document;
      if (!doc) return;
      // Remove existing injected style if any
      const existing = doc.getElementById('__transparent-fix__');
      if (existing) existing.remove();
      const style = doc.createElement('style');
      style.id = '__transparent-fix__';
      style.textContent = TRANSPARENT_CSS;
      (doc.head || doc.documentElement).appendChild(style);
    } catch (e) {
      // Cross-origin iframes will block access — nothing we can do from JS in that case
    }
  }

  function attachTransparentListener(iframe) {
    iframe.addEventListener('load', () => injectTransparentBg(iframe));
  }
  // ==============================================================

  function loadSettings() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const p = JSON.parse(raw);
        if (Array.isArray(p.entries) && p.entries.length > 0) return p;
      }
    } catch {}
    return {
      entries: [
        {id:1, url:'https://tikfinity.zerody.one/widget/topgifter?cid=3152097'},
        {id:2, url:'https://tikfinity.zerody.one/widget/topliker?cid=3152097'}
      ],
      interval: 30,
      preloadSecs: 3
    };
  }

  function persistSettings() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ entries, interval: intervalSecs, preloadSecs }));
    } catch {}
  }

  const _saved = loadSettings();
  let entries = _saved.entries;
  let nextId = entries.reduce((m, e) => Math.max(m, e.id), 0) + 1;
  let loopTimer = null;
  let loopEnabled = false;
  let loopIndex = 0;
  let timeLeft = 0;
  let intervalSecs = _saved.interval || 10;
  let preloadSecs = _saved.preloadSecs || 3;
  let activeFrame = 'A';
  let isPreloading = false;

  function normalize(raw) {
    const t = (raw || '').trim();
    if (!t) return '';
    return /^https?:\/\//i.test(t) ? t : 'https://' + t;
  }

  const frameA = document.getElementById('frameA');
  const frameB = document.getElementById('frameB');

  // Attach transparent background listeners to both iframes
  attachTransparentListener(frameA);
  attachTransparentListener(frameB);

  function getActive() { return activeFrame === 'A' ? frameA : frameB; }
  function getHidden() { return activeFrame === 'A' ? frameB : frameA; }

  function showFrame(frame, url) {
    const other = frame === frameA ? frameB : frameA;
    document.getElementById('emptyState').style.display = 'none';
    if (frame.src !== url) frame.src = url;
    frame.style.display = 'block';
    other.style.display = 'none';
  }

  function go() {
    const url = normalize(document.getElementById('singleInput').value);
    if (!url) return;
    stopLoop(false);
    activeFrame = 'A';
    showFrame(frameA, url);
    closeSettings();
  }

  document.getElementById('singleInput').addEventListener('keydown', e => { if (e.key === 'Enter') go(); });

  function toggleSettings() {
    if (loopEnabled) { stopLoop(true); return; }
    const p = document.getElementById('settingsPanel');
    const btn = document.getElementById('settingsBtn');
    const open = p.style.display === 'block';
    p.style.display = open ? 'none' : 'block';
    btn.classList.toggle('open', !open);
    renderEntries();
  }

  function closeSettings() {
    document.getElementById('settingsPanel').style.display = 'none';
    document.getElementById('settingsBtn').classList.remove('open');
  }

  function renderEntries() {
    const list = document.getElementById('entriesList');
    list.innerHTML = '';
    entries.forEach((e, i) => {
      const row = document.createElement('div');
      row.className = 'entry-row';
      const removeBtn = entries.length > 1
        ? `<button class="remove-btn" onclick="removeEntry(${e.id})">✕</button>` : '';
      row.innerHTML = `
        <span class="entry-num">${i+1}</span>
        <input class="entry-input" type="text" placeholder="مثال: example.com" value="${e.url}"
          dir="ltr" spellcheck="false" onchange="updateEntry(${e.id}, this.value)" oninput="updateEntry(${e.id}, this.value)" />
        ${removeBtn}
      `;
      list.appendChild(row);
    });
  }

  function updateEntry(id, val) { entries = entries.map(e => e.id === id ? {...e, url: val} : e); persistSettings(); }
  function addEntry() { entries.push({id: nextId++, url: ''}); renderEntries(); persistSettings(); }
  function removeEntry(id) { entries = entries.filter(e => e.id !== id); renderEntries(); persistSettings(); }

  function validUrls() { return entries.map(e => normalize(e.url)).filter(Boolean); }

  function applyLoop() {
    const urls = validUrls();
    if (!urls.length) return;
    intervalSecs = Math.max(1, +document.getElementById('intervalInput').value || 10);
    preloadSecs  = Math.max(1, +document.getElementById('preloadInput').value  || 3);
    persistSettings();
    closeSettings();
    startLoop(urls);
  }

  function startLoop(urls) {
    stopLoop(false);
    loopEnabled = true;
    loopIndex = 0;
    timeLeft = intervalSecs;
    isPreloading = false;
    activeFrame = 'A';

    showFrame(frameA, urls[0]);
    setLoopBarVisible(true);
    updateBar(urls[0]);

    if (urls.length > 1 && intervalSecs <= preloadSecs) {
      frameB.src = urls[1];
      setPreloading(true);
    }

    document.getElementById('settingsBtn').textContent = '⏹ إيقاف';
    document.getElementById('settingsBtn').className = 'icon-btn stop';
    document.getElementById('goBtn').disabled = true;
    document.getElementById('singleInput').disabled = true;

    loopTimer = setInterval(() => {
      timeLeft--;
      const nextIdx = (loopIndex + 1) % urls.length;

      if (timeLeft === preloadSecs && urls.length > 1) {
        const hidden = getHidden();
        hidden.src = urls[nextIdx];
        setPreloading(true);
      }

      updateBar(urls[loopIndex]);

      if (timeLeft <= 0) {
        activeFrame = activeFrame === 'A' ? 'B' : 'A';
        loopIndex = nextIdx;
        timeLeft = intervalSecs;
        setPreloading(false);

        const active = getActive();
        const hidden = getHidden();
        active.style.display = 'block';
        hidden.style.display = 'none';
        document.getElementById('emptyState').style.display = 'none';

        if (intervalSecs <= preloadSecs && urls.length > 1) {
          const nextNextIdx = (loopIndex + 1) % urls.length;
          hidden.src = urls[nextNextIdx];
          setPreloading(true);
        }

        updateBar(urls[loopIndex]);
      }
    }, 1000);
  }

  function setPreloading(val) {
    isPreloading = val;
    document.getElementById('preloadIndicator').style.display = val ? 'block' : 'none';
    document.getElementById('preloadBadge').style.display = val ? 'inline-flex' : 'none';
  }

  function setLoopBarVisible(v) {
    document.getElementById('loopBar').style.display = v ? '' : 'none';
  }

  function updateBar(currentUrl) {
    const pct = ((intervalSecs - timeLeft) / intervalSecs) * 100;
    document.getElementById('loopBarFill').style.width = pct + '%';
    const label = (currentUrl || '').replace(/^https?:\/\//, '').slice(0, 45);
    document.getElementById('loopBarText').textContent = label + ' — ' + timeLeft + 'ث';
  }

  function stopLoop(resetUi) {
    if (loopTimer) { clearInterval(loopTimer); loopTimer = null; }
    loopEnabled = false;
    setPreloading(false);
    if (resetUi) {
      setLoopBarVisible(false);
      document.getElementById('settingsBtn').textContent = '⚙️ لوب';
      document.getElementById('settingsBtn').className = 'icon-btn';
      document.getElementById('goBtn').disabled = false;
      document.getElementById('singleInput').disabled = false;
    }
  }

  document.getElementById('intervalInput').value = intervalSecs;
  document.getElementById('preloadInput').value = preloadSecs;
  renderEntries();

  const _autoUrls = validUrls();
  if (_autoUrls.length > 0) {
    startLoop(_autoUrls);
  }
</script>
</body>
</html>
