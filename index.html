<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iframe Viewer</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600&family=Inter:wght@400;500;600&display=swap');

    *, *::before, *::after{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html,body{
      width:100%;
      height:100%;
      overflow:hidden;
    }

    body{
      font-family:'IBM Plex Sans Arabic','Inter',sans-serif;
      background:#0f1117;
      color:#e2e8f0;
    }

    .app-root{
      display:flex;
      flex-direction:column;
      width:100vw;
      height:100vh;
      overflow:hidden;
    }

    .top-bar{
      display:flex;
      align-items:center;
      gap:12px;
      padding:10px 16px;
      background:#16181f;
      border-bottom:1px solid rgba(255,255,255,.07);
      flex-shrink:0;
      direction:rtl;
    }

    .logo{
      font-size:14px;
      font-weight:600;
      color:#94a3b8;
      white-space:nowrap;
    }

    .url-bar{
      flex:1;
      display:flex;
      align-items:center;
      gap:8px;
      direction:ltr;
    }

    .url-input{
      flex:1;
      height:38px;
      padding:0 12px;
      background:#1e2130;
      border:1.5px solid rgba(255,255,255,.1);
      border-radius:9px;
      color:#e2e8f0;
      font-size:13px;
      font-family:'Inter', monospace;
      outline:none;
    }

    .url-input:focus{
      border-color:#6366f1;
      box-shadow:0 0 0 3px rgba(99,102,241,.15);
    }

    .go-btn{
      height:38px;
      padding:0 18px;
      background:#6366f1;
      color:#fff;
      border:none;
      border-radius:9px;
      cursor:pointer;
      font-weight:600;
    }

    .settings-btn{
      height:38px;
      padding:0 16px;
      background:#1e2130;
      border:1.5px solid rgba(255,255,255,.1);
      border-radius:9px;
      color:#94a3b8;
      cursor:pointer;
      font-weight:600;
    }

    .settings-btn.stop{
      background:rgba(239,68,68,.12);
      border-color:rgba(239,68,68,.4);
      color:#fca5a5;
    }

    .loop-bar-wrap{
      position:relative;
      height:28px;
      background:#1a1d27;
      border-bottom:1px solid rgba(255,255,255,.06);
      overflow:hidden;
      flex-shrink:0;
      display:none;
    }

    .loop-bar-fill{
      position:absolute;
      inset:0;
      width:0%;
      background:linear-gradient(90deg,
      rgba(99,102,241,.35),
      rgba(139,92,246,.25));
      transition:width .9s linear;
    }

    .loop-bar-label{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:11px;
      color:#94a3b8;
      font-family:'Inter', monospace;
      direction:ltr;
    }

    .settings-panel{
      background:#13151e;
      border-bottom:1px solid rgba(255,255,255,.08);
      padding:20px;
      display:none;
    }

    .field-label{
      display:block;
      font-size:12px;
      color:#64748b;
      margin-bottom:8px;
    }

    .interval-input{
      width:90px;
      height:36px;
      padding:0 10px;
      background:#1e2130;
      border:1.5px solid rgba(255,255,255,.1);
      border-radius:8px;
      color:#fff;
      text-align:center;
    }

    .entries-list{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-top:15px;
    }

    .entry-row{
      display:flex;
      align-items:center;
      gap:8px;
      direction:ltr;
    }

    .entry-num{
      width:22px;
      height:22px;
      background:rgba(99,102,241,.15);
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:11px;
      color:#a5b4fc;
    }

    .entry-input{
      flex:1;
      height:36px;
      padding:0 10px;
      background:#1e2130;
      border:1.5px solid rgba(255,255,255,.09);
      border-radius:8px;
      color:#fff;
      outline:none;
    }

    .remove-btn{
      width:28px;
      height:28px;
      border:none;
      border-radius:6px;
      background:rgba(239,68,68,.1);
      color:#f87171;
      cursor:pointer;
    }

    .add-btn,
    .apply-btn{
      width:100%;
      margin-top:12px;
      height:38px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-weight:600;
    }

    .add-btn{
      background:#1e2130;
      color:#94a3b8;
    }

    .apply-btn{
      background:linear-gradient(135deg,#6366f1,#8b5cf6);
      color:#fff;
    }

    .frame-area{
      position:relative;
      flex:1;
      overflow:hidden;
      background:#000;
    }

    .embed-frame{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      border:none;
      background:#fff;
    }

    .hidden-preload{
      opacity:0;
      pointer-events:none;
      transform:translateX(-100%);
    }

    .slide-in{
      animation:slideIn .9s cubic-bezier(.22,.61,.36,1) forwards;
      z-index:2;
    }

    .slide-out{
      animation:slideOut .9s cubic-bezier(.22,.61,.36,1) forwards;
      z-index:1;
    }

    @keyframes slideIn{
      from{
        transform:translateX(-100%);
        opacity:0;
      }
      to{
        transform:translateX(0%);
        opacity:1;
      }
    }

    @keyframes slideOut{
      from{
        transform:translateX(0%);
        opacity:1;
      }
      to{
        transform:translateX(100%);
        opacity:0;
      }
    }

    .empty-state{
      height:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:10px;
      color:#64748b;
    }
  </style>
</head>

<body>

<div class="app-root">

  <header class="top-bar">
    <span class="logo">🔗 iframe Viewer</span>

    <div class="url-bar">
      <input
        id="singleInput"
        type="text"
        class="url-input"
        placeholder="example.com"
      />

      <button id="goBtn" class="go-btn">
        عرض
      </button>
    </div>

    <button id="settingsBtn" class="settings-btn">
      ⚙️ لوب
    </button>
  </header>

  <div id="loopBar" class="loop-bar-wrap">
    <div id="loopBarFill" class="loop-bar-fill"></div>
    <span id="loopBarLabel" class="loop-bar-label"></span>
  </div>

  <div id="settingsPanel" class="settings-panel">

    <label class="field-label">
      المدة بين كل رابط
    </label>

    <input
      id="intervalInput"
      type="number"
      class="interval-input"
      value="15"
      min="6"
    />

    <div id="entriesList" class="entries-list"></div>

    <button class="add-btn" onclick="addEntry()">
      + إضافة رابط
    </button>

    <button class="apply-btn" onclick="applyLoop()">
      ▶ تشغيل اللوب
    </button>

  </div>

  <main class="frame-area" id="frameArea">

    <div id="emptyState" class="empty-state">
      <div style="font-size:52px">🌐</div>
      <p>أدخل رابط أو شغل اللوب</p>
    </div>

  </main>

</div>

<script>

let entries = [{id:1,url:''},{id:2,url:''}];
let nextId = 3;

let loopEnabled = false;
let loopTimer = null;

let loopIndex = 0;
let intervalSecs = 15;

let currentFrame = null;
let nextFrame = null;

function normalize(raw){
  const t = raw.trim();
  if(!t) return '';
  return /^https?:\/\//i.test(t)
    ? t
    : 'https://' + t;
}

function saveLoopData(){
  localStorage.setItem('loopEntries', JSON.stringify(entries));
  localStorage.setItem('loopInterval', intervalSecs);
}

function loadLoopData(){

  const savedEntries =
    localStorage.getItem('loopEntries');

  const savedInterval =
    localStorage.getItem('loopInterval');

  if(savedEntries){
    entries = JSON.parse(savedEntries);
    nextId =
      Math.max(...entries.map(e=>e.id),0)+1;
  }

  if(savedInterval){
    intervalSecs = +savedInterval;
  }

  document.getElementById('intervalInput').value =
    intervalSecs;
}

function renderEntries(){

  const list =
    document.getElementById('entriesList');

  list.innerHTML = '';

  entries.forEach((e,i)=>{

    const row = document.createElement('div');

    row.className = 'entry-row';

    row.innerHTML = `
      <span class="entry-num">${i+1}</span>

      <input
        class="entry-input"
        type="text"
        value="${e.url}"
        placeholder="example.com"
        data-id="${e.id}"
      />

      ${
        entries.length > 1
        ? `<button class="remove-btn" data-id="${e.id}">✕</button>`
        : ''
      }
    `;

    list.appendChild(row);

  });

  list.querySelectorAll('.entry-input')
  .forEach(inp=>{

    inp.addEventListener('input',ev=>{

      const id = +ev.target.dataset.id;

      entries = entries.map(e=>
        e.id===id
        ? {...e,url:ev.target.value}
        : e
      );

      saveLoopData();

    });

  });

  list.querySelectorAll('.remove-btn')
  .forEach(btn=>{

    btn.addEventListener('click',ev=>{

      const id = +ev.currentTarget.dataset.id;

      entries = entries.filter(e=>e.id!==id);

      saveLoopData();

      renderEntries();

    });

  });

}

function addEntry(){

  entries.push({
    id:nextId++,
    url:''
  });

  saveLoopData();

  renderEntries();

}

function createFrame(url, hidden=false){

  const frame =
    document.createElement('iframe');

  frame.className =
    'embed-frame' +
    (hidden ? ' hidden-preload' : '');

  frame.sandbox =
    "allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox";

  frame.src = url;

  return frame;

}

function transitionTo(frame){

  if(currentFrame){

    currentFrame.classList.add('slide-out');

    setTimeout(()=>{
      currentFrame?.remove();
    },900);

  }

  frame.classList.remove('hidden-preload');

  frame.classList.add('slide-in');

  currentFrame = frame;

}

function preloadNext(url){

  if(nextFrame){
    nextFrame.remove();
  }

  nextFrame = createFrame(url,true);

  document
    .getElementById('frameArea')
    .appendChild(nextFrame);

}

function showInstant(url){

  const area =
    document.getElementById('frameArea');

  const empty =
    document.getElementById('emptyState');

  empty.style.display = 'none';

  const frame = createFrame(url);

  area.appendChild(frame);

  if(currentFrame){
    currentFrame.remove();
  }

  currentFrame = frame;

}

function go(){

  const url =
    normalize(
      document.getElementById('singleInput').value
    );

  if(!url) return;

  stopLoop();

  showInstant(url);

}

document.getElementById('goBtn')
.addEventListener('click',go);

document.getElementById('singleInput')
.addEventListener('keydown',e=>{

  if(e.key === 'Enter'){
    go();
  }

});

function applyLoop(){

  const valid =
    entries
    .map(e=>normalize(e.url))
    .filter(Boolean);

  if(!valid.length) return;

  intervalSecs = Math.max(
    6,
    +document.getElementById('intervalInput').value || 15
  );

  saveLoopData();

  loopEnabled = true;

  document.getElementById('settingsBtn')
  .textContent = '⏹ إيقاف';

  document.getElementById('settingsBtn')
  .classList.add('stop');

  document.getElementById('loopBar')
  .style.display = '';

  document.getElementById('settingsPanel')
  .style.display = 'none';

  loopIndex = 0;

  showInstant(valid[0]);

  updateBar(valid[0], intervalSecs);

  if(valid.length > 1){

    preloadNext(
      valid[(loopIndex + 1) % valid.length]
    );

  }

  let timeLeft = intervalSecs;

  loopTimer = setInterval(()=>{

    timeLeft--;

    updateBar(valid[loopIndex], timeLeft);

    if(
      timeLeft === 5 &&
      valid.length > 1
    ){

      const nextIndex =
        (loopIndex + 1) % valid.length;

      preloadNext(valid[nextIndex]);

    }

    if(timeLeft <= 0){

      if(nextFrame){

        transitionTo(nextFrame);

      }

      loopIndex =
        (loopIndex + 1) % valid.length;

      timeLeft = intervalSecs;

    }

  },1000);

}

function updateBar(url,t){

  const pct =
    ((intervalSecs - t) / intervalSecs) * 100;

  document.getElementById('loopBarFill')
  .style.width = pct + '%';

  document.getElementById('loopBarLabel')
  .textContent =
    url.replace(/^https?:\/\//,'')
    + ' — ' + t + 'ث';

}

function stopLoop(){

  if(loopTimer){

    clearInterval(loopTimer);

    loopTimer = null;

  }

  loopEnabled = false;

}

function stopLoopManual(){

  stopLoop();

  document.getElementById('settingsBtn')
  .textContent = '⚙️ لوب';

  document.getElementById('settingsBtn')
  .classList.remove('stop');

  document.getElementById('loopBar')
  .style.display = 'none';

}

document.getElementById('settingsBtn')
.addEventListener('click',()=>{

  if(loopEnabled){

    stopLoopManual();

    return;

  }

  const panel =
    document.getElementById('settingsPanel');

  panel.style.display =
    panel.style.display === 'block'
    ? 'none'
    : 'block';

});

loadLoopData();
renderEntries();

</script>

</body>
</html>
